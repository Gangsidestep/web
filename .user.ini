; PHP per-directory settings for shared hosting
; Disable remote include/open functions where possible
allow_url_fopen = Off
allow_url_include = Off

; Disable dangerous execution functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen

; Restrict PHP to the webroot and /tmp (adjust paths if needed)
; Allow access to php_private for admin credentials
open_basedir = /home/clients/a87f9485d236547310279906c2e64cab/web:/home/clients/a87f9485d236547310279906c2e64cab/php_private:/tmp

; Keep output compression enabled if desired
zlib.output_compression = On

; Note: .user.ini is read by PHP periodically (user_ini.cache_ttl);
; changes may take effect after a short delay.